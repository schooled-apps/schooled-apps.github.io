<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand -->
  <g transform="translate(96 96)">
    <rect width="72" height="72" rx="16" fill="#1E3A8A"/>
    <text x="36" y="51" text-anchor="middle"
          font-family="Outfit, system-ui, sans-serif"
          font-size="44" font-weight="800" letter-spacing="-1"
          fill="#FFFFFF">S</text>
    <circle cx="56" cy="16" r="6" fill="#F97316"/>
  </g>
  <text x="192" y="148" fill="#0F172A"
        font-family="Outfit, system-ui, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-0.5">Schooled</text>
  <text x="192" y="174" fill="#475569"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="16" font-weight="500">A suite of school apps</text>

  <!-- Big headline -->
  <text x="96" y="320" fill="#0F172A"
        font-family="Outfit, system-ui, sans-serif"
        font-size="84" font-weight="700" letter-spacing="-2">Software for the work</text>
  <text x="96" y="416" fill="#0F172A"
        font-family="Outfit, system-ui, sans-serif"
        font-size="84" font-weight="700" letter-spacing="-2">of running a <tspan fill="#F97316">school</tspan>.</text>

  <text x="96" y="476" fill="#475569"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="22" font-weight="400">Finance for the bursar. Kids for the school bus. More on the way.</text>

  <!-- Footer -->
  <line x1="96" y1="540" x2="1104" y2="540" stroke="#E5E7EB" stroke-width="1"/>
  <text x="96" y="582" fill="#94A3B8"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="14" letter-spacing="2">SCHOOLED.CSECO.CO.KE · NAIROBI</text>
</svg>
